<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Site de despedida com seções para amigos, senha de acesso e mensagem revelada." />
  <title>Despedida</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Playfair+Display:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app-shell" id="appShell"></main>

  <div class="modal" id="passwordModal" aria-hidden="true">
    <div class="modal__backdrop" data-close-modal></div>
    <section class="modal__card" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <button class="modal__close" type="button" aria-label="Fechar modal" data-close-modal>×</button>
      <p class="modal__kicker">Cartão de Acesso</p>
      <h2 class="modal__title" id="modalTitle">Uma memória em comum...</h2>
      <p class="modal__description">Digite a senha combinada para abrir a carta e revelar a despedida.</p>

      <form class="password-form" id="passwordForm" autocomplete="off">
        <input class="password-form__input" id="passwordInput" name="password" type="text" inputmode="text" placeholder="Digite a senha" aria-label="Senha de acesso" />
        <button class="password-form__button" type="submit">Abrir</button>
      </form>

      <p class="modal__feedback" id="modalFeedback" aria-live="polite"></p>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
